enable-module-update = true
parallel-jobs = 1
compression-level = 9
remove-rv-integrations-checks = true

[YouTube-NonRoot]
patches-source = "anddea/revanced-patches"
cli-source = "MorpheApp/morphe-cli"
arch = "both"
included-patches = "'Hide Shorts dimming'"
patcher-args = "-e 'Hide shortcuts' -Oexplore=true -Oshorts=true -e 'Theme' -OdarkThemeBackgroundColor=#000000 -OlightThemeBackgroundColor=#FFFFFF"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"

[YouTube]
patches-source = "anddea/revanced-patches"
cli-source = "MorpheApp/morphe-cli"
arch = "arm64-v8a"
build-mode = "module"
included-patches = "'Hide Shorts dimming'"
patcher-args = "-e 'Hide shortcuts' -Oexplore=true -Oshorts=true -e 'Theme' -OdarkThemeBackgroundColor=#000000 -OlightThemeBackgroundColor=#FFFFFF"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"

[YouTube-Music-NonRoot]
patches-source = "anddea/revanced-patches"
cli-source = "MorpheApp/morphe-cli"
arch = "both"
included-patches = "'Disable music video in album' 'Hide overlay filter' 'Hide player overlay filter'"
patcher-args = "-e 'Dark theme' -OdarkThemeBackgroundColor=#000000"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/20260413_20260413_0608"

[YouTube-Music]
patches-source = "anddea/revanced-patches"
cli-source = "MorpheApp/morphe-cli"
arch = "arm64-v8a"
build-mode = "module"
included-patches = "'Disable music video in album' 'Hide overlay filter' 'Hide player overlay filter'"
patcher-args = "-e 'Dark theme' -OdarkThemeBackgroundColor=#000000"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/20260413_20260413_0608"

[SoundCloud]
enabled = false
arch = "both"
apkmirror-dlurl = "https://apkmirror.com/apk/soundcloud"
uptodown-dlurl = "https://soundcloud.en.uptodown.com/android"

[GooglePhotos]
enabled = false
arch = "both"
included-patches = "'Enable DCIM folders backup control'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/photos/"
uptodown-dlurl = "https://google-photos.en.uptodown.com/android"
